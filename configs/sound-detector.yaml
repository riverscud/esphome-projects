esphome:
  name: "sound-detector"
  friendly_name: Sound Detector
  min_version: 2024.11.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

binary_sensor:
  - platform: template
    name: "Baby Cry (Analog Threshold)"
    device_class: sound
    lambda: |-
      return id(sound_envelope).state > 0.76;  // tweak threshold
 

# 2) Read the ENVELOPE pin for an analog sound‐level value
sensor:
  - platform: adc
    name: "Baby Sound Level"
    id: sound_envelope
    pin: GPIO34            # wire ENVELOPE → GPIO36 (VP)
    update_interval: 100ms
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
    unit_of_measurement: "V"
