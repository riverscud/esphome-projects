esphome:
  name: air-duct-damper
  friendly_name: Air Duct Damper
  on_boot:
    priority: 600
    then:
      - logger.log: "Boot: forcing flap CLOSED"
      - script.execute:
          id: set_flap_position
          open: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air-Duct-Damper Fallback Hotspot"
    password: "xxxxxxxxxxxxxxxxxx"

captive_portal:
    
# SERVO CONFIG
output:
  - platform: ledc
    id: servo_pwm
    pin: GPIO14          # D7 on your board (servo signal)
    frequency: 50 Hz

servo:
  - id: air_flap_servo
    output: servo_pwm

# GLOBAL STATE (true = open, false = closed)
globals:
  - id: flap_is_open
    type: bool
    restore_value: false
    initial_value: 'false'

# SCRIPT TO MOVE SERVO
script:
  - id: set_flap_position
    parameters:
      open: bool
    then:
      - if:
          condition:
            lambda: 'return open;'
          then:
            # OPEN POSITION
            - logger.log: "Script: Opening flap (level 0.55)"
            - servo.write:
                id: air_flap_servo
                level: 0.55      # OPEN (~100° – tweak as needed)
            - globals.set:
                id: flap_is_open
                value: 'true'
          else:
            # CLOSED POSITION
            - logger.log: "Script: Closing flap (level 0.00)"
            - servo.write:
                id: air_flap_servo
                level: 0.00      # CLOSED (~0°)
            - globals.set:
                id: flap_is_open
                value: 'false'

# EXPOSE AS A COVER IN HOME ASSISTANT
cover:
  - platform: template
    name: "Air Flap"
    id: air_flap_cover
    device_class: damper
    optimistic: true
    has_position: false

    open_action:
      - script.execute:
          id: set_flap_position
          open: true

    close_action:
      - script.execute:
          id: set_flap_position
          open: false

    stop_action: []        # required but unused

    lambda: |-
      if (id(flap_is_open)) {
        return COVER_OPEN;
      } else {
        return COVER_CLOSED;
      }

# PHYSICAL BUTTON (TOGGLE FLAP)
binary_sensor:
  - platform: gpio
    id: flap_button
    name: "Air Flap Button"
    pin:
      number: GPIO4       # your button pin
      mode:
        input: true
        pullup: true
      inverted: true      # pressed = true when pulled to GND
    on_press:
      then:
        - logger.log: "Button pressed - toggling flap"
        - if:
            condition:
              lambda: 'return id(flap_is_open);'
            then:
              - script.execute:
                  id: set_flap_position
                  open: false
            else:
              - script.execute:
                  id: set_flap_position
                  open: true
